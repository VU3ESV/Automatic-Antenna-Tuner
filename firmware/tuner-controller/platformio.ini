; Tuner-controller firmware build configuration.
;
; Four environments, all built in CI from M0 to enforce two abstractions:
;
;   1. MCU portability rule in ../../CLAUDE.md "MCU selection" — keeps
;      Teensy 4.1 (Phase 1) and STM32H743 (Phase 2 fallback) both green.
;   2. Ethernet backend portability rule in docs/ARCHITECTURE.md §5.1.2 —
;      keeps QNEthernet and NativeEthernet both green so the net_hal/
;      abstraction stays honest.
;
;   teensy41          - Phase 1 deployed target, QNEthernet (lwIP). Default.
;   teensy41_native   - Phase 1 alternative, NativeEthernet (FNET).
;   nucleo_h743zi     - Phase 2 fallback target; lwIP via stm32duino.
;   native            - Host-side unit tests (HAL-independent app/ code).
;
; Add libraries to env-specific lib_deps only when they're MCU-portable;
; otherwise gate them with TARGET_* macros under src/hal/.

[platformio]
default_envs = teensy41

[env]
build_unflags = -std=gnu++11
build_flags   = -std=gnu++17 -Wall -Wextra -Wno-unused-parameter -I src
; Discover the shared firmware/lib/* PlatformIO libraries (net_hal etc.)
; The chain+ LDF mode lets the finder respect the #ifdef-gated Ethernet
; headers inside net_hal so only the active backend's includes are
; followed during dependency resolution.
lib_extra_dirs = ${PROJECT_DIR}/../lib
lib_ldf_mode   = chain+
; ArduinoJson is used by src/app/protocol.cpp which is MCU-portable
; application code — put it here so every MCU env inherits it.
lib_deps      =
    bblanchon/ArduinoJson @ ^7.4.0
    net_hal

; ---- Phase 1 common settings -----------------------------------------------
[teensy41_common]
platform        = teensy
board           = teensy41
framework       = arduino
; teensy-gui uses the bundled Teensy Loader app — no extra install needed.
; For headless / CI flows: `brew install teensy_loader_cli` and switch to
; `upload_protocol = teensy-cli`.
upload_protocol = teensy-gui
monitor_speed   = 115200
; Pin monitor port by USB hardware ID (PJRC VID:Teensy-CDC-PID).
monitor_port    = hwgrep://16C0:0483

; ---- Phase 1 default: Teensy 4.1 + QNEthernet (lwIP) -----------------------
; Portable to STM32H7. Modern, actively maintained.
[env:teensy41]
extends     = teensy41_common
build_flags = ${env.build_flags} -DTARGET_TEENSY41 -DTUNER_NET_QNETHERNET
lib_deps    =
    ${env.lib_deps}
    ssilverman/QNEthernet @ ~0.35.0

; ---- Phase 1 alternative: Teensy 4.1 + NativeEthernet (FNET) ---------------
; Matches Morconi / TeensyMaestro / FlexRigTeensy convention. See
; docs/ARCHITECTURE.md §5.1.2.
[env:teensy41_native]
extends     = teensy41_common
build_flags = ${env.build_flags} -DTARGET_TEENSY41 -DTUNER_NET_NATIVEETHERNET
lib_deps    =
    ${env.lib_deps}
    https://github.com/vjmuzik/NativeEthernet.git
    vjmuzik/FNET @ ^0.1.3

; ---- Phase 2 fallback: STM32H743 on Nucleo (Phase-2-pending) ----------------
; This env is currently expected to FAIL to build — the net_hal/ layer has
; no STM32 lwIP backend yet, and main.cpp depends on it. The env is kept
; here as a structural placeholder; building it locally is a useful
; check once an STM32 backend is added (Phase 2, M5). CI does not build
; this env until then — see .github/workflows/firmware-ci.yml.
[env:nucleo_h743zi]
platform        = ststm32
board           = nucleo_h743zi
framework       = arduino
upload_protocol = stlink
debug_tool      = stlink
monitor_speed   = 115200
build_flags     = ${env.build_flags} -DTARGET_STM32H743

; ---- Host-side unit tests (no MCU required) --------------------------------
[env:native]
platform         = native
build_flags      = ${env.build_flags} -DUNIT_TEST -DTARGET_NATIVE
test_framework   = unity
test_build_src   = yes
; net_hal is a Teensy-only Ethernet shim — exclude on native (any source
; that would include it is already filtered out below).
lib_ignore       = net_hal
; Native excludes:
;   main.cpp                — Arduino setup/loop entry point
;   hal/led_{teensy41,stm32h7}.cpp — MCU-gated impls (only led_native.cpp builds)
;   tuner_server.cpp        — TCP server uses Ethernet types (net_hal lib)
build_src_filter = +<**/*.cpp> -<main.cpp> -<hal/led_teensy41.cpp> -<hal/led_stm32h7.cpp> -<tuner_server.cpp> -<app/protocol.cpp>
