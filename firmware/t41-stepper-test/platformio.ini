; Teensy 4.1 + grblHAL-teensy-4.x V2.09 carrier — X-axis stepper bench-test POC.
;
; Drives the X-axis stepper channel on Phil Barrett's grblHAL Teensy 4.x
; V2.09 carrier board, exercising the same feature set as the Arduino-Mega
; and ESP32-C6 bench-tests (firmware/mega-stepper-test, esp32c6-stepper-test):
;
;   - Interactive Serial menu over USB
;   - Jog ±100 / rotate N revolutions / continuous CW-CCW with rev counter
;   - Stop, emergency-stop, idle auto-release (persisted)
;   - Position persistence in EEPROM + boot-time homing back to step 0
;
; Hardware:
;   - Teensy 4.1 in the carrier socket
;   - X-axis STEP / DIR / EN → external stepper driver (TMC2209 / DM542 /
;     equivalent) → motor
;   - 5 V + 12 V power to the carrier per its silkscreen
;
; Pin numbers for X STEP / X DIR / X EN must be filled into src/main.cpp
; from the upstream V2.07 schematic (see docs/HW-T41-CARRIER.md References).
; A build-time guard refuses to compile until those constants are set.

[platformio]
default_envs = teensy41

[env:teensy41]
platform        = teensy
board           = teensy41
framework       = arduino
upload_protocol = teensy-gui
monitor_speed   = 115200
; Pin the monitor by USB hardware ID so PlatformIO always finds the
; Teensy regardless of which port it enumerates as. PJRC's VID is 16C0;
; Teensy serial-mode PID is 0483.
monitor_port    = hwgrep://16C0:0483

build_unflags   = -std=gnu++11
; Pull pin map from the production tuner-controller HAL so bench and
; production firmware share one source of truth for the V2.09 carrier
; wiring (see firmware/tuner-controller/src/hal/board/t41_v209.h).
build_flags     = -std=gnu++17 -Wall -Wextra -Wno-unused-parameter
                  -I ../tuner-controller/src/hal/board

lib_deps        =
    waspinator/AccelStepper @ ^1.64
