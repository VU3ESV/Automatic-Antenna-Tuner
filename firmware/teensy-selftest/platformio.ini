; Teensy 4.1 + Ethernet selftest.
;
; Standalone bring-up project — verifies the board, USB serial, LED,
; Ethernet PHY, DHCP, and an HTTP server reachable from the LAN.
;
; Two Ethernet backends are supported, swappable via the chosen
; environment. Same source code compiles against either. See
; docs/ARCHITECTURE.md §5.1.2 for the rationale.
;
;   teensy41         (default) — QNEthernet (lwIP). Portable to STM32H7.
;   teensy41_native            — NativeEthernet (FNET). Ham-radio convention.

[platformio]
default_envs = teensy41

[env]
build_unflags = -std=gnu++11
build_flags   = -std=gnu++17 -Wall -Wextra -Wno-unused-parameter

[teensy41_common]
platform        = teensy
board           = teensy41
framework       = arduino
upload_protocol = teensy-gui
monitor_speed   = 115200
; Pin the monitor port by USB hardware ID so PlatformIO always finds the
; Teensy regardless of which port it's plugged into. PJRC's VID is
; 16C0; Teensy serial-mode PID is 0483.
monitor_port    = hwgrep://16C0:0483

; ---------------------------------------------------------------------------
; env: teensy41  — QNEthernet (lwIP). Default. Portable to STM32H7.
; ---------------------------------------------------------------------------
[env:teensy41]
extends     = teensy41_common
build_flags = ${env.build_flags} -DTUNER_NET_QNETHERNET
lib_deps    =
    ssilverman/QNEthernet @ ~0.35.0

; ---------------------------------------------------------------------------
; env: teensy41_native  — NativeEthernet (FNET).
; Matches the convention used by Morconi / TeensyMaestro / FlexRigTeensy.
; ---------------------------------------------------------------------------
[env:teensy41_native]
extends     = teensy41_common
build_flags = ${env.build_flags} -DTUNER_NET_NATIVEETHERNET
; NativeEthernet isn't in the PlatformIO registry — pull from GitHub.
; FNET is its dependency and IS in the registry.
lib_deps    =
    https://github.com/vjmuzik/NativeEthernet.git
    vjmuzik/FNET @ ^0.1.3
