; Arduino Mega 2560 R3 + TB6600 + NEMA 23 stepper-motor bench test.
;
; Standalone bring-up project — exercises a NEMA 23 stepper through a
; TB6600 driver via DIR/PUL/ENA signals.  Interactive Serial menu lets
; you jog, set speed, change direction, run N revolutions, and toggle
; enable without re-flashing.
;
; Wiring (common-cathode: signal− to GND, signal+ to GPIO):
;   TB6600 ENA+ → Mega D8       ENA- → GND
;   TB6600 DIR+ → Mega D9       DIR- → GND
;   TB6600 PUL+ → Mega D10      PUL- → GND
;
; Power:  TB6600 VCC/GND → 24–48 VDC PSU (match NEMA 23 rating).
;         A+/A-/B+/B- → NEMA 23 coils.

[platformio]
default_envs = mega2560

[env:mega2560]
platform      = atmelavr
board         = megaatmega2560
framework     = arduino
monitor_speed = 115200
lib_deps      =
    waspinator/AccelStepper @ ^1.64
