; ESP32-C6 DevKitC-1 + TB6600 + NEMA 23 stepper-motor bench test.
;
; Standalone bring-up project — exercises a NEMA 23 stepper through a
; TB6600 driver via DIR/PUL/ENA signals.  Interactive Serial menu over
; the C6's built-in USB Serial/JTAG peripheral lets you jog, set speed,
; change direction, run N revolutions, and toggle enable without
; re-flashing.
;
; Wiring (common-cathode: signal− to GND, signal+ to GPIO):
;   TB6600 ENA+ → C6 GPIO6    ENA- → GND
;   TB6600 DIR+ → C6 GPIO7    DIR- → GND
;   TB6600 PUL+ → C6 GPIO10   PUL- → GND
;
; Power: TB6600 VCC/GND → 24–48 VDC PSU (match motor rating).
;        A+/A-/B+/B- → NEMA 23 coils.
;
; NOTE: The ESP32-C6 drives signals at 3.3 V.  Most TB6600 modules accept
; this, but the opto-coupler current may be marginal compared to a 5 V
; Arduino.  If steps are missed, either (a) reduce the TB6600's internal
; series resistor on the input side, or (b) buffer with a 3.3 V→5 V
; level shifter or NPN transistor.

[platformio]
default_envs = esp32-c6-devkitc-1

[env:esp32-c6-devkitc-1]
platform      = https://github.com/pioarduino/platform-espressif32/releases/download/53.03.13/platform-espressif32.zip
board         = esp32-c6-devkitc-1
framework     = arduino
monitor_speed = 115200
; CH343 USB-to-UART bridge → Serial uses the C6's hardware UART0.
build_flags   =
    -DARDUINO_USB_MODE=0
    -DARDUINO_USB_CDC_ON_BOOT=0
; Use min_spiffs partition to give the OTA app slot more room
; (two OTA app partitions ≈ 1.9 MB each, no SPIFFS).
board_build.partitions = min_spiffs.csv
lib_deps      =
    waspinator/AccelStepper @ ^1.64

; OTA upload path (after the board is on the network):
;   pio run -t upload --upload-port=esp32c6-stepper.local
; The upload goes to the on-device web UI at /update — no extra flags.
; For local-cable uploads, keep upload_protocol=esptool (default).
