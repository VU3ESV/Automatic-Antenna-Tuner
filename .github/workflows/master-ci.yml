name: master-ci

# Master controller (Go service): vet, race-tested unit tests, build
# for both native and the Pi (linux/arm64). Mirrors LP-100A-Server's
# CI shape so station services stay uniform.

on:
  push:
    branches: [ main ]
    paths:
      - 'master/**'
      - '.github/workflows/master-ci.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'master/**'
      - '.github/workflows/master-ci.yml'

defaults:
  run:
    working-directory: master/tuner-master

jobs:
  vet-test-build:
    name: vet + test (race) + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: master/tuner-master/go.sum
      - name: go vet
        run: go vet ./...
      - name: gofmt check
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "::error::gofmt would change the following files:"
            gofmt -l .
            gofmt -d .
            exit 1
          fi
      - name: go test (race)
        run: go test ./... -race -count=1
      - name: build (native)
        run: go build -o /tmp/tuner-master .
      - name: build (linux/arm64 — Raspberry Pi)
        env:
          GOOS: linux
          GOARCH: arm64
        run: go build -o /tmp/tuner-master-linux-arm64 .
